<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaLearning | Infinite Engine v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0052ff; --s: #00d1ff; --bg: #06070a; --c: #12141c; --txt: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--txt); min-height: 100vh; overflow-x: hidden; }

        /* CEO Header */
        nav { background: rgba(18, 20, 28, 0.8); backdrop-filter: blur(20px); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.8rem; background: linear-gradient(90deg, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 1200px; margin: 3rem auto; display: grid; grid-template-columns: 1fr 400px; gap: 2rem; padding: 0 2rem; }

        /* Quiz Master */
        .card { background: var(--c); border-radius: 40px; padding: 4rem; border: 1px solid #222; box-shadow: 0 40px 100px rgba(0,0,0,0.5); position: relative; }
        .badge { background: var(--p); color: white; padding: 6px 20px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 2rem; display: inline-block; }
        
        #q-text { font-size: 2.2rem; font-weight: 700; line-height: 1.2; margin-bottom: 3rem; }

        .opt-grid { display: grid; gap: 1.2rem; }
        .option { background: #1a1d29; border: 2px solid #222; padding: 1.5rem; border-radius: 24px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; font-size: 1.2rem; font-weight: 600; }
        .option:hover { border-color: var(--s); background: #1e2436; transform: scale(1.02); }
        .option.correct { background: #052c1e; border-color: #10b981; }
        .option.wrong { background: #3d0a13; border-color: #f43f5e; }

        /* Sidebar & AI */
        .side { display: flex; flex-direction: column; gap: 2rem; }
        .ai-box { background: linear-gradient(180deg, #12141c 0%, #000 100%); border-radius: 35px; padding: 2.5rem; border: 1px solid #222; position: relative; }
        .ai-status { color: var(--s); font-size: 0.8rem; font-weight: 800; margin-bottom: 1rem; display: block; }
        #ai-msg { font-size: 1.1rem; line-height: 1.6; color: #a0aec0; margin-bottom: 2rem; }

        .btn-ai { width: 100%; padding: 1.2rem; border: none; border-radius: 20px; background: var(--p); color: white; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,82,255,0.3); }
        
        .xp-card { background: #12141c; padding: 2rem; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .bar { width: 100%; height: 12px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #fill { height: 100%; background: var(--s); width: 0%; transition: 1s; }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">NOVA GLOBAL</div>
    <div style="font-weight: 700;">LEVEL: <span id="lvl">1</span></div>
</nav>

<div class="container">
    <main class="card">
        <div id="tag" class="badge">SİSTEM BAŞLATILIYOR</div>
        <div id="q-text">Hazır mısın CEO? Sonsuzluk motoru devreye giriyor...</div>
        <div class="opt-grid" id="opts"></div>
    </main>

    <aside class="side">
        <div class="ai-box">
            <span class="ai-status">● CANLI AI ANALİZİ</span>
            <div id="ai-msg">Veri akışı optimize edildi. Matematik soruları artık gerçek zamanlı üretiliyor. Bir daha aynı soruyu görmen imkansız.</div>
            <button class="btn-ai" onclick="getHint()">STRATEJİ ÜRET</button>
        </div>
        <div class="xp-card">
            <div style="font-size: 0.9rem; color: #718096;">TOPLAM TECRÜBE (XP)</div>
            <div id="total-xp" style="font-size: 2.5rem; font-weight: 900; color: var(--s);">0</div>
            <div class="bar"><div id="fill"></div></div>
        </div>
    </aside>
</div>

<script>
    // Sözel Soru Havuzu (5. Sınıf)
    const verbalDB = [
        { c: "Bilişim", q: "Dosya boyutunu küçültmek için yapılan işleme ne denir?", o: ["Silme", "Kopyalama", "Sıkıştırma", "Taşıma"], a: 2, h: "Bir valize çok eşya koymak gibi düşün kanka." },
        { c: "Fen Bilimleri", q: "Ay'ın kaç ana evresi vardır?", o: ["2", "4", "6", "8"], a: 1, h: "Yeni ay, İlk dördün, Dolunay ve Son dördün." },
        { c: "Sosyal Bilgiler", q: "Dünyanın en büyük okyanusu hangisidir?", o: ["Atlas", "Hint", "Büyük Okyanus (Pasifik)", "Arktik"], a: 2, h: "İsmi üzerinde, en büyüğü!" },
        { c: "Türkçe", q: "'Yüz' kelimesi aşağıdakilerin hangisinde farklı anlamdadır?", o: ["Suda yüzmek", "Sayı olan yüz", "İnsanın yüzü", "Defterin yüzü"], a: 3, h: "Eş sesli kelimelere dikkat et." }
    ];

    let state = {
        xp: parseInt(localStorage.getItem('nova_xp')) || 0,
        usedIds: JSON.parse(localStorage.getItem('nova_used')) || [],
        current: null
    };

    function generateMath() {
        const types = ['add', 'sub', 'mul'];
        const type = types[Math.floor(Math.random() * types.length)];
        let n1, n2, q, a, ops = [];

        if(type === 'add') {
            n1 = Math.floor(Math.random() * 500) + 100;
            n2 = Math.floor(Math.random() * 500) + 100;
            q = `${n1} + ${n2} işleminin sonucu kaçtır?`;
            a = n1 + n2;
        } else if(type === 'sub') {
            n1 = Math.floor(Math.random() * 1000) + 500;
            n2 = Math.floor(Math.random() * 400) + 1;
            q = `${n1} - ${n2} işleminin sonucu kaçtır?`;
            a = n1 - n2;
        } else {
            n1 = Math.floor(Math.random() * 15) + 2;
            n2 = Math.floor(Math.random() * 12) + 2;
            q = `${n1} x ${n2} işleminin sonucu kaçtır?`;
            a = n1 * n2;
        }

        ops = [a, a + 10, a - 5, a + (Math.floor(Math.random()*20)+1)];
        ops = ops.sort(() => Math.random() - 0.5);

        return { c: "Matematik (Auto-Gen)", q: q, o: ops.map(String), a: ops.indexOf(a), h: "Kağıt kalem kullanmak serbest kanka!" };
    }

    function init() {
        // %60 ihtimalle matematik (sonsuz), %40 sözel
        if (Math.random() > 0.4) {
            state.current = generateMath();
        } else {
            let available = verbalDB.filter((_, i) => !state.usedIds.includes(i));
            if (available.length === 0) {
                state.usedIds = []; // Hepsi biterse sıfırla
                available = verbalDB;
            }
            const idx = Math.floor(Math.random() * available.length);
            state.current = available[idx];
            state.usedIds.push(verbalDB.indexOf(state.current));
            localStorage.setItem('nova_used', JSON.stringify(state.usedIds));
        }
        render();
    }

    function render() {
        document.getElementById('tag').innerText = state.current.c;
        document.getElementById('q-text').innerText = state.current.q;
        const grid = document.getElementById('opts');
        grid.innerHTML = "";

        state.current.o.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'option';
            d.innerHTML = `<span style="color:var(--s); margin-right:15px;">${i+1}.</span> ${t}`;
            d.onclick = () => select(i, d);
            grid.appendChild(d);
        });
        updateUI();
    }

    function select(i, el) {
        const items = document.querySelectorAll('.option');
        items.forEach(opt => opt.style.pointerEvents = 'none');

        if(i === state.current.a) {
            el.classList.add('correct');
            state.xp += 30;
            document.getElementById('ai-msg').innerText = "KRİTİK BAŞARI: Algoritmam senin öğrenme hızına yetişemiyor CEO!";
        } else {
            el.classList.add('wrong');
            items[state.current.a].classList.add('correct');
            document.getElementById('ai-msg').innerText = "VERİ HATASI: Bu yanlışı veritabanına işledim, bir dahaki sefere daha odaklı ol.";
        }

        localStorage.setItem('nova_xp', state.xp);
        setTimeout(init, 1500);
    }

    function updateUI() {
        const xp = state.xp;
        document.getElementById('total-xp').innerText = xp;
        document.getElementById('lvl').innerText = Math.floor(xp / 150) + 1;
        document.getElementById('fill').style.width = (xp % 150 / 1.5) + "%";
    }

    function getHint() {
        document.getElementById('ai-msg').innerText = "AI İPUCU: " + state.current.h;
    }

    init();
</script>
</body>
</html>
